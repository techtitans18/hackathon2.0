<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Workspace | Healthcare Blockchain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/shared.js" defer></script>
    <script src="/static/patient.js" defer></script>
  </head>
  <body class="shared-theme-bg">
    <div class="bg-orb bg-orb-one" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-two" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="layout">
      <header class="topbar card">
        <div>
          <p class="eyebrow">Patient Workspace</p>
          <h2>My Medical Records</h2>
        </div>
        <div class="user-badge">
          <img id="user-picture" alt="" />
          <div>
            <p id="user-name"></p>
            <p id="user-email"></p>
          </div>
        </div>
        <button id="logout-btn" type="button" class="ghost-btn">Log out</button>
      </header>

      <section class="grid">
        <article class="card wide">
          <h3>My E-Healthcard</h3>
          <div id="ehealth-card" class="ehealth-card">
            <img id="ehealth-photo" alt="Patient photo" />
            <div class="ehealth-meta">
              <p class="ehealth-title">Digital Health Card</p>
              <p><strong>Name:</strong> <span id="ehealth-name">-</span></p>
              <p><strong>Health ID:</strong> <span id="ehealth-id">-</span></p>
              <p><strong>Blood Group:</strong> <span id="ehealth-blood-group">-</span></p>
              <p><strong>Mobile:</strong> <span id="ehealth-phone">-</span></p>
            </div>
          </div>
          <button id="load-ehealth-card-btn" type="button">Load My E-Healthcard</button>
          <p class="hint">Linked HealthID: <strong id="health-id-label"></strong></p>
          <button id="load-records-btn" type="button">Load My Records</button>
          <div id="records-container" class="record-list"></div>
          <pre id="records-output" class="output"></pre>
        </article>
      </section>
    </main>

    <aside id="status-banner" class="status hidden" aria-live="polite"></aside>
  </body>
</html>
